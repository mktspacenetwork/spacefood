name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy
    runs-on: [self-hosted, linux, spacefood]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to nginx (atomic symlink swap)
        run: ./scripts/deploy.sh

      - name: Summary
        if: always()
        run: |
          echo "### Deploy result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release: \`$(readlink -f /var/www/spacefood/current 2>/dev/null || echo n/a)\`" >> "$GITHUB_STEP_SUMMARY"
