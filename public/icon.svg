<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6a00"/>
      <stop offset="100%" style="stop-color:#ee0000"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>
  <!-- Rocket/Spoon icon -->
  <g transform="translate(256,240)" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bowl/dish -->
    <path d="M-110,40 Q-110,110 0,110 Q110,110 110,40" fill="rgba(255,255,255,0.15)" stroke="white"/>
    <line x1="-130" y1="40" x2="130" y2="40"/>
    <!-- Steam lines -->
    <path d="M-50,-30 Q-50,-60 -30,-70 Q-10,-80 -10,-100" stroke="rgba(255,255,255,0.7)" stroke-width="12"/>
    <path d="M0,-20 Q0,-50 20,-60 Q40,-70 40,-95" stroke="rgba(255,255,255,0.7)" stroke-width="12"/>
    <path d="M50,-30 Q50,-60 70,-70 Q90,-80 90,-100" stroke="rgba(255,255,255,0.7)" stroke-width="12"/>
    <!-- Star sparkle -->
    <circle cx="100" cy="-90" r="4" fill="white" stroke="none"/>
    <circle cx="-90" cy="-80" r="3" fill="white" stroke="none"/>
  </g>
  <!-- Text "SF" -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="72" fill="rgba(255,255,255,0.9)" letter-spacing="6">SpaceFood</text>
</svg>
